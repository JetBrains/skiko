<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Skiko Extensions Sample</title>
    <style>
        :root {
            --sample-size: min(100vw, 100vh, 640px);
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: grid;
            place-items: center;
        }

        canvas {
            width: var(--sample-size);
            height: var(--sample-size);
            display: block;
        }
    </style>
</head>
<body>
<canvas id="SkikoTarget" width="640" height="640"></canvas>
<script src="webApp.js"></script>
</body>
</html>
