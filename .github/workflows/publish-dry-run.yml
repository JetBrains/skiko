name: Skiko Publish Dry Run

on:
  workflow_call: # Allow being called by other workflows

jobs:
  Android:
    name: 'Android Publish Dry Run'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish Maven Local'
        with:
          image_name: linux-compat
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.android.enabled=true \
              :skiko:publishToMavenLocal

      - uses: ./.github/actions/docker-skiko-run
        name: 'Check Android Sample'
        with:
          image_name: linux-compat
          working_directory: samples/SkiaAndroidSample
          command: |
            ./gradlew --no-daemon --stacktrace \
              packageRelease

  Web:
    name: 'Web Publish Dry Run'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish Maven Local'
        with:
          image_name: linux-emscripten-amd64
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.wasm.enabled=true \
              :skiko:publishToMavenLocal

  Linux:
    name: 'Linux Publish Dry Run'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish KMP and AWT Maven Local'
        with:
          image_name: linux-compat
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.native.enabled=true \
              -Pskiko.awt.enabled=true \
              :skiko:publishKotlinMultiplatformPublicationToMavenLocal \
              :skiko:publishAwtPublicationToMavenLocal \
              :skiko:publishAwtRuntimeElementsPublicationToMavenLocal

      - uses: ./.github/actions/docker-skiko-run
        name:  'Publish AWT Runtime x64 Maven Local'
        with:
          image_name: linux-compat
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.awt.enabled=true \
              :skiko:publishSkikoJvmRuntimeLinuxX64PublicationToMavenLocal \
              -Pskiko.arch=x64

      - uses: ./.github/actions/docker-skiko-run
        name: 'Publish Native Maven Local'
        with:
          image_name: linux-amd64
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.native.enabled=true \
              -Pskiko.awt.enabled=false \
              :skiko:publishLinuxArm64PublicationToMavenLocal \
              :skiko:publishLinuxX64PublicationToMavenLocal

      - uses: ./.github/actions/docker-skiko-run
        name: 'Check AWT Sample'
        with:
          image_name: linux-compat
          command: |
            ./gradlew --no-daemon --stacktrace \
              :SkiaAwtSample:installDist

  LinuxArm:
    name: 'Linux Publish Dry Run'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - uses: ./.github/actions/docker-skiko-run
        name:  'Publish AWT Runtime Arm64 Maven Local'
        with:
          image_name: linux-compat
          command: |
            ./gradlew --no-daemon --stacktrace \
              -Pskiko.awt.enabled=true \
              :skiko:publishSkikoJvmRuntimeLinuxArm64PublicationToMavenLocal \
              -Pskiko.arch=arm64

  macOS:
    name: 'macOS Publish Dry Run'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: actions/setup-java@v4
        name: 'Setup JDK 21'
        with:
          java-version: '21'
          distribution: 'corretto'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - shell: bash
        name: 'Publish Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.native.enabled=true \
            :skiko:publishToMavenLocal

      - shell: bash
        name: 'Publish AWT Runtime x64 Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.awt.enabled=true \
            :skiko:publishSkikoJvmRuntimeMacosX64PublicationToMavenLocal \
            -Pskiko.arch=x64

      - shell: bash
        name: 'Publish AWT Runtime Arm64 Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.awt.enabled=true \
            :skiko:publishSkikoJvmRuntimeMacosArm64PublicationToMavenLocal \
            -Pskiko.arch=arm64

      - shell: bash
        name: 'Check AWT Sample'
        run: |
          ./gradlew --no-daemon --stacktrace \
            :SkiaAwtSample:installDist

  Windows:
    name: 'Windows Publish Dry Run'
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        name: 'Check out code'

      - uses: microsoft/setup-msbuild@v1

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-java@v4
        name: 'Setup JDK 21'
        with:
          java-version: '21'
          distribution: 'corretto'

      - uses: ./.github/actions/setup-prerequisites
        name: 'Setup Prerequisites'

      - shell: bash
        name: 'Publish Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.native.enabled=true \
             :skiko:publishToMavenLocal

      - shell: bash
        name: 'Publish AWT Runtime x64 Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.awt.enabled=true \
            :skiko:publishSkikoJvmRuntimeWindowsX64PublicationToMavenLocal \
            -Pskiko.arch=x64

      - shell: bash
        name: 'Publish AWT Runtime Arm64 Maven Local'
        run: |
          ./gradlew --no-daemon --stacktrace \
            -Pskiko.awt.enabled=true \
            :skiko:publishSkikoJvmRuntimeWindowsArm64PublicationToMavenLocal \
            -Pskiko.arch=arm64

      - shell: bash
        name: 'Check AWT Sample'
        run: |
          ./gradlew --no-daemon --stacktrace \
            :SkiaAwtSample:installDist
