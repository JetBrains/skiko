name: 'Setup Native Build Environment'
description: 'Set up the macOS native build environment: select Xcode and install required LLVM tools'

inputs:
  xcode-path:
    description: 'Path to the Xcode developer directory'
    default: '/Applications/Xcode.app/Contents/Developer'

runs:
  using: "composite"
  steps:
    - name: Select Xcode
      shell: bash
      run: sudo xcode-select -s ${{ inputs.xcode-path }}

    - name: Install LLVM
      shell: bash
      run: brew install llvm
